name: ai_educator
description: "Learnly - AI-powered learning experience platform."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # UI & Theming
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  flutter_animate: ^4.5.2
  gap: ^3.0.1

  # Audio Player
  audioplayers: ^6.4.0

  # Storage
  shared_preferences: ^2.3.5

  # Utilities
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Riverpod Code Generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
